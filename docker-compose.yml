# Docker Compose for OpsPilotAI local development.
# Removed deprecated top-level "version" field (obsolete since Compose v2).
#
# Usage:
#   cp .env.example .env   # edit credentials if needed
#   docker compose up -d
#
# The app container depends on db being healthy before starting.

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB:       "${POSTGRES_DB}"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - opspilot_pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Llama__SqlBaseUrl:       "${LLAMA_SQL_BASE_URL:-http://host.docker.internal:8080}"
      Llama__EmbeddingBaseUrl: "${LLAMA_EMBEDDING_BASE_URL:-http://host.docker.internal:8081}"
    ports:
      - "${APP_PORT:-5010}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  opspilot_pgdata:
